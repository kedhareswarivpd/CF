version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: corefusion-fastapi
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    volumes:
      - ../uploads:/usr/src/app/uploads
      - ../logs:/usr/src/app/logs
    ports:
      - '8000:8000'
    networks:
      - corefusion-net

  # NOTE: PostgreSQL is no longer run locally — this app connects directly to
  # your Supabase project's Postgres instance (see .env: DB_HOST etc.), which
  # also hosts the `auth.users` table that Supabase Auth manages. Redis is
  # kept for optional local caching.
  redis:
    image: redis:7-alpine
    container_name: corefusion-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - corefusion-net

  nginx:
    image: nginx:1.27-alpine
    container_name: corefusion-nginx
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../uploads:/usr/src/app/uploads:ro
    ports:
      - '80:80'
    networks:
      - corefusion-net

networks:
  corefusion-net:
    driver: bridge

volumes:
  redis_data:
